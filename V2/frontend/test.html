<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Collision Console</title>
</head>
<body>

    <h1>Simulation en arrière-plan...</h1>
    <p>Ouvrez la console de votre navigateur (Touche F12 ou Clic Droit -> Inspecter -> Console) pour voir le résultat.</p>

    <script type="module">
        // 1. IMPORTATION DES MODULES
        import { StatCalculator } from './backend/core/StatCalculator.js';
        import { CollisionHandler } from './backend/core/CollisionHandler.js';

        async function runRandomSimulation() {
            try {
                // 2. CHARGEMENT DES DONNÉES JSON
                console.log("📥 Chargement des bases de données...");
                const [petalsRes, utilsRes, spillsRes, eggsRes, mobsRes] = await Promise.all([
                    fetch('./backend/data/petals.json'),
                    fetch('./backend/data/utilities.json'),
                    fetch('./backend/data/spills.json'),
                    fetch('./backend/data/eggs.json'),
                    fetch('./backend/data/mobs.json')
                ]);

                const petals = await petalsRes.json();
                const utils = await utilsRes.json();
                const spills = await spillsRes.json();
                const eggs = await eggsRes.json();
                const mobs = await mobsRes.json();

                // On regroupe toutes les pétales pour le tirage au sort
                const allPetals = { ...petals, ...utils, ...spills, ...eggs };
                
                console.log("✅ Données chargées !");
                console.log("Liste des Pétales :", Object.keys(allPetals));
                console.log("Liste des Mobs :", Object.keys(mobs));

                // 3. TIRAGE AU SORT DES COMBATTANTS
                // Entité 1 peut être un Mob ou une Pétale
                const allEntitiesKeys = [...Object.keys(allPetals), ...Object.keys(mobs)];
                const randomEnt1Key = allEntitiesKeys[Math.floor(Math.random() * allEntitiesKeys.length)];
                
                // Entité 2 est obligatoirement un Mob
                const allMobsKeys = Object.keys(mobs);
                const randomEnt2Key = allMobsKeys[Math.floor(Math.random() * allMobsKeys.length)];

                console.log(`\n🎲 Tirage au sort : [${randomEnt1Key}] VS [${randomEnt2Key}]`);

                // 4. PRÉPARATION DES STATISTIQUES
                let fighter1;
                
                // Si l'Entité 1 est une pétale, on passe par le StatCalculator (Ex: Tier 6)
                if (allPetals[randomEnt1Key]) {
                    const rawPetal = allPetals[randomEnt1Key];
                    // Un buff neutre par défaut
                    const defaultBuffs = { damageMultiplier: 1, healthMultiplier: 1, reloadMultiplier: 1, flatArmor: 0 };
                    
                    const finalStats = StatCalculator.computeFinalStats(rawPetal, 6, defaultBuffs);
                    
                    fighter1 = {
                        name: `${rawPetal.name} (T6)`,
                        health: finalStats.health || 1, // 1 HP par défaut si c'est une aura sans vie
                        damage: finalStats.damage || 0, // 0 Dégât si c'est une aura
                        armor: finalStats.armor || 0,
                        healPerSecond: 0
                    };
                } 
                // Sinon, c'est un mob, on prend ses stats directes
                else {
                    const rawMob = mobs[randomEnt1Key];
                    fighter1 = {
                        name: rawMob.name,
                        health: rawMob.health,
                        damage: rawMob.damage,
                        armor: rawMob.armor,
                        healPerSecond: 0
                    };
                }

                // L'Entité 2 (Cible) est forcément un mob
                const rawMobTarget = mobs[randomEnt2Key];
                let fighter2 = {
                    name: rawMobTarget.name,
                    health: rawMobTarget.health,
                    damage: rawMobTarget.damage,
                    armor: rawMobTarget.armor,
                    healPerSecond: 0
                };

                // 5. LANCEMENT DU COMBAT
                console.log(`\n⚔️ DÉBUT DU COMBAT !`);
                console.log(`Attaquant :`, fighter1);
                console.log(`Défenseur :`, fighter2);

                const report = CollisionHandler.resolveCollision(fighter1, fighter2);

                // 6. AFFICHAGE DU RÉSULTAT
                console.log(`\n🏆 RÉSULTAT :`);
                console.dir(report);

            } catch (error) {
                console.error("❌ Erreur lors de la simulation. Êtes-vous bien sur un serveur local ?", error);
            }
        }

        // On lance le script
        runRandomSimulation();

    </script>
</body>
</html>
