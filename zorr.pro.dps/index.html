<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petal Debugger</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: Inter, Arial, sans-serif;
            background: #18181b;
            color: #e4e4e7;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 15px;
        }

        .container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: #27272a;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #3f3f46;
        }

        label {
            display: block;
            margin-bottom: 4px;
            color: #a1a1aa;
            font-size: 14px;
        }

        input,
        select {
            width: 100%;
            padding: 8px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #3f3f46;
            background: #18181b;
            color: white;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        #values {
            display: grid;
            grid-template-columns: 1fr 100px;
            gap: 6px 12px;
            max-height: 700px;
            overflow-y: auto;
            padding-right: 8px;
        }

        #values label {
            margin: auto 0;
            font-size: 13px;
        }

        #values input {
            margin: 0;
            width: 100%;
        }

        .result {
            margin-top: 15px;
            background: #09090b;
            border: 1px solid #3f3f46;
            border-radius: 8px;
            padding: 12px;
            min-height: 300px;
            overflow: auto;
            white-space: pre-wrap;
            font-family: Consolas, monospace;
            font-size: 13px;
        }

        @media (max-width: 1000px) {
            .container {
                grid-template-columns: 1fr;
            }

            #values {
                max-height: none;
            }
        }
    </style>
</head>

<body>

    <h1>Petal Debugger</h1>

    <div class="container">

        <div class="left-panel">

            <div class="card">
                <h2>Petal Stats</h2>

                <label>Petal</label>
                <select id="petal-name"></select>

                <label>Tier</label>
                <input id="petal-tier" type="number" value="0" min="0">

                <button id="btn-test">
                    Test Petal
                </button>
            </div>

            <div class="card">
                <h2>Combat Simulator</h2>

                <label>Attacker</label>
                <select id="attacker-name"></select>

                <label>Attacker Tier</label>
                <input id="attacker-tier" type="number" value="0" min="0">

                <label>Target</label>
                <select id="target-name"></select>

                <label>Target Tier</label>
                <input id="target-tier" type="number" value="0" min="0">

                <button id="btn-combat">
                    Run Combat
                </button>
            </div>

        </div>

        <div class="card">
            <h2>Player Values</h2>

            <div id="values"></div>

            <h2 style="margin-top: 25px;">Output</h2>

            <pre id="result" class="result"></pre>
        </div>

    </div>

    <script type="module" src="/src/main.ts"></script>

</body>
</html>
