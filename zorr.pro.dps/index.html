<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Petal Debugger</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        label { display: inline-block; width: 250px; }
        input, select { width: 120px; margin-bottom: 4px; }
        #values { display: grid; grid-template-columns: auto auto; gap: 4px 20px; margin-top: 20px; }
        pre { background: #111; color: #0f0; padding: 10px; overflow: auto; }
    </style>
</head>
<body>
    <h1>Petal Debugger</h1>

    <label>Petal :</label>
    <select id="petal-name"></select>
    <br>

    <label>Tier :</label>
    <input type="number" id="petal-tier" value="0" min="0" max="9">
    <br><br>

    <h2>Player Values</h2>
    <div id="values"></div>

    <br>
    <button id="btn-test">Calculer</button>

    <h2>Résultat</h2>
    <pre id="result"></pre>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
