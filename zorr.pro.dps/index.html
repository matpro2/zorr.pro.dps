<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zorr.pro.dps - Inventaire</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- STYLE GLOBAL --- */
        body, button, input, select { 
            font-family: 'Fredoka', sans-serif; 
            font-weight: 600; 
            color: #222; 
        }

        /* --- TEXTES AVEC BORDURE FLORR.IO --- */
        h2, .card-name, .qty-badge, .entity-badge {
            color: #ffffff !important;
            font-weight: 900 !important;
            text-shadow: 
                -1px -1px 0 #000,  
                 1px -1px 0 #000,
                -1px  1px 0 #000,
                 1px  1px 0 #000,
                 0px -1px 0 #000,
                 0px  1px 0 #000,
                -1px  0px 0 #000,
                 1px  0px 0 #000,
                 0px  2px 2px rgba(0,0,0,0.6) !important;
            letter-spacing: 0.5px;
        }

        body { margin: 20px; background: #ecf0f1; }
        
        button { cursor: pointer; padding: 6px 12px; border: 2px solid #2c3e50; background: #34495e; border-radius: 4px; font-size: 0.9em; }
        button:hover:not(:disabled) { background: #2c3e50; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        input[type="number"], select { background: #95a5a6; border: 2px solid #7f8c8d; border-radius: 4px; padding: 4px; }
        
        .layout { display: flex; gap: 15px; flex-wrap: wrap; }
        .panel { flex: 1; min-width: 250px; padding: 20px; border: 1px solid #ccc; background: #fff; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .input-group { display: flex; gap: 10px; align-items: center; margin: 10px 0; }
        
        /* --- COMPOSANT FACTORISÉ : CARD SLOT --- */
        .card-slot { 
            position: relative; /* Le parent n'a plus ni bordure, ni fond, ni opacité */
            box-sizing: border-box; 
            border-radius: 3px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card-slot:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 6px 12px rgba(0,0,0,0.15); 
            z-index: 999;
        }

        /* La partie visuelle qui contiendra la couleur, la bordure et la transparence */
        .card-visuals {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            align-items: center; 
            box-sizing: border-box; 
            border-radius: 3px;
            border: 5px solid transparent; 
            z-index: 1;
        }

        /* Tailles de Cartes */
        .card-small {
            flex: 0 1 65px; 
            min-width: 48px; 
            height: 65px; 
            cursor: pointer;
        }
        .card-small .card-visuals {
            padding: 4px;
        }

        .card-large {
            width: 100px;
            height: 100px;
            cursor: default;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); /* L'ombre de base reste sur le parent */
        }
        .card-large .card-visuals {
            padding: 8px;
        }

        /* Contenu de la Carte */
        .card-name {
            width: 100%;
            text-align: center;
            flex-grow: 1; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            word-wrap: break-word; 
            line-height: 1.1;
            padding: 0 2px;
            z-index: 5;
        }

        .card-dps {
            font-size: 11px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0px 1px 2px rgba(0,0,0,0.4);
            padding: 2px 0;
            border-radius: 4px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
            z-index: 5;
        }

        /* Badges de Quantité et d'Entité */
        .qty-badge, .entity-badge {
            position: absolute;
            font-size: 11px;
            z-index: 15;
        }
        .qty-badge { top: -6px; right: -6px; }
        .entity-badge { bottom: 16px; right: -4px; color: #e84393 !important; }

        /* --- TOOLTIP FACTORISÉ (Survol Automatique) --- */
        .tooltip-content { 
            display: none; 
            position: absolute; 
            bottom: 110%; 
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 25, 20, 0.75); /* Fond sombre transparent */
            border: 2px solid #222; 
            padding: 12px; 
            border-radius: 8px; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.5); 
            width: max-content; 
            min-width: 220px; 
            z-index: 1000; /* Priorité maximale */
            font-size: 0.9em; 
            font-weight: normal; 
            color: #fff; 
            text-align: left; 
            cursor: default; 
        }
        .tooltip-content::after { content: ""; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border-width: 6px; border-style: solid; border-color: rgba(15, 25, 20, 0.95) transparent transparent transparent; }
        .tooltip-content::before { content: ""; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border-width: 8px; border-style: solid; border-color: #222 transparent transparent transparent; }
        
        .card-slot:hover .tooltip-content { display: block; }

        .card-slot.tooltip-flip .tooltip-content {
            bottom: auto;
            top: 110%;
        }
        .card-slot.tooltip-flip .tooltip-content::after {
            top: auto;
            bottom: 100%;
            border-color: transparent transparent rgba(15, 25, 20, 0.95) transparent;
        }
        .card-slot.tooltip-flip .tooltip-content::before {
            top: auto;
            bottom: 100%;
            border-color: transparent transparent #222 transparent;
        }

        .tooltip-content.tooltip-left {
            left: 0;
            transform: none;
        }
        .tooltip-content.tooltip-left::after,
        .tooltip-content.tooltip-left::before {
            left: 10px;
            transform: none;
        }

        /* --- CONTENEURS D'INTERFACE --- */
        #slots-container { display: flex; flex-wrap: nowrap; justify-content: center; gap: 6px; width: 100%; padding-bottom: 5px; }
        #target-stats { display: flex; justify-content: center; margin-top: 15px; min-height: 100px; }
        #target-panel { background-color: #dbd74b; border: 5px solid #c5c143; border-radius: 3px; }
        #player-panel { background-color: #db5a5a; border: 5px solid #c55151; border-radius: 3px; }
        #inventory-panel { background-color: #5a9fdb; border: 5px solid #518fc5; border-radius: 3px; }
        .inventory-layout { display: flex; flex-wrap: wrap; gap: 10px; padding-top: 15px; }
    </style>
</head>
<body>
    <div style="margin-bottom: 20px; width: 100%; box-sizing: border-box;">
        <div style="display: flex; justify-content: center; margin-bottom: 15px;">
            <div id="total-dps-display" style="font-size: 1.3em; font-weight: bold; background: #2c3e50; color: #fff; padding: 8px 16px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                Total DPS: 0
            </div>
        </div>
        <div id="slots-container"></div>
    </div>

    <div class="layout">
        <div id="target-panel" class="panel" style="flex: 1; min-width: 300px;">
            <h2 style="margin-top: 0;">Target Mob</h2>
            <div class="input-group">
                <select id="target-select" style="flex: 1;"></select>
                <label>Tier:</label>
                <input id="target-tier" type="number" value="0" min="0">
            </div>
            <div id="target-stats"></div>
        </div>

        <div id="player-panel" class="panel" style="flex: 1; min-width: 300px;">
            <h2 style="margin-top: 0;">Player Stats</h2>
            <div id="player-stats-container" style="font-size: 0.9em; line-height: 1.5;"></div>
        </div>
    </div>

    <div id="inventory-panel" class="panel" style="margin-top: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
            
            <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                <h2 style="margin: 0;">Inventory</h2>
                <div class="input-group" style="margin: 0; background: #f0f3f4; padding: 6px 12px; border-radius: 6px; border: 1px solid #dcdde1; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);">
                    <select id="item-select" style="border-radius: 4px; padding: 4px; border: 1px solid #ccc;"></select>
                    
                    <label style="font-size: 0.9em; font-weight: bold; margin-left: 5px;">Tier:</label>
                    <input id="item-tier" type="number" value="0" min="0" style="width: 45px; padding: 4px; border: 1px solid #ccc; border-radius: 4px;">
                    
                    <label style="font-size: 0.9em; font-weight: bold; margin-left: 5px;">Qté:</label>
                    <input id="item-qty" type="number" value="1" min="1" style="width: 45px; padding: 4px; border: 1px solid #ccc; border-radius: 4px;">
                    
                    <button id="btn-add" style="background: #27ae60; color: white; font-weight: bold; border: none; padding: 6px 12px; border-radius: 4px; margin-left: 10px; cursor: pointer; transition: 0.2s;">
                        + Add
                    </button>
                </div>
            </div>

            <div class="input-group" style="margin: 0;">
                <label style="font-weight: bold;">Filter by Type:</label>
                <select id="filter-type" style="border-radius: 4px; padding: 4px;">
                    <option value="all">All Types</option>
                    <option value="default">Default (DPS > 0)</option>
                    <option value="special">Special (Poison/Fire/Lightning)</option>
                    <option value="utility">Utility (Player Stats)</option>
                    <option value="egg">Egg</option>
                    <option value="spill">Spill</option>
                </select>
            </div>
        </div>
        
        <div id="inventory-grid" class="inventory-layout"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
