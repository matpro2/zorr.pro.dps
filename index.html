<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>zorr.pro.dps</title>
    <style>
        .lightbox-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .lightbox-content {
            background-color: white;
            margin: 10% auto;
            padding: 20px;
            width: 300px;
            border: 1px solid black;
        }
        .stats-container, .mob-container, .slots-container {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            display: inline-block;
            vertical-align: top;
            margin-right: 10px;
        }
        #active-mob-display, .equipped-item {
            padding: 8px;
            border-radius: 4px;
            margin-top: 5px;
            border: 1px solid #999;
        }
        .equipped-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
            gap: 10px;
        }
        .tier-container {
            margin-bottom: 15px;
        }
        #total-dps-display {
            font-size: 1.2em;
            color: #2c3e50;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>zorr.pro.dps</h1>

    <div class="slots-container">
        <h2>Equipped Slots</h2>
        <div id="slots-list">No petals equipped</div>
        <div id="total-dps-display">Total DPS: <strong>0.00</strong></div>
    </div>

    <div class="mob-container">
        <h2>Target Mob</h2>
        <div id="active-mob-display">No mob selected</div>
        <br>
        <button onclick="openMobLightbox()">Select Mob</button>
    </div>
    
    <div class="stats-container">
        <h2>Player Stats</h2>
        <label for="player-luck">Player Luck Multiplier:</label>
        <input type="number" id="player-luck" value="1.0" step="0.1" oninput="updatePlayerStats()">
    </div>
    <br>

    <button onclick="openPetalLightbox()">+ Add Petal to Comparison</button>
    <br><br>

    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Tier</th>
                <th>Qty</th>
                <th>Health</th>
                <th>Damage</th>
                <th>Armor</th>
                <th>Reload (s)</th>
                <th>Ticks</th>
                <th><button onclick="sortByDPS()">Effective DPS ↕️</button></th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="table-body">
        </tbody>
    </table>

    <div id="petal-lightbox" class="lightbox-modal">
        <div class="lightbox-content">
            <h3>Select a petal:</h3>
            <div class="tier-container">
                <label for="tier-selection">Petal Tier:</label>
                <input type="number" id="tier-selection" value="0" min="0">
            </div>
            <ul id="petal-selection-list"></ul>
            <button onclick="closePetalLightbox()">Close</button>
        </div>
    </div>

    <div id="mob-lightbox" class="lightbox-modal">
        <div class="lightbox-content">
            <h3>Select a mob:</h3>
            <div class="tier-container">
                <label for="mob-tier-selection">Mob Tier:</label>
                <input type="number" id="mob-tier-selection" value="0" min="0">
            </div>
            <ul id="mob-selection-list"></ul>
            <button onclick="closeMobLightbox()">Close</button>
        </div>
    </div>

    <script src="petal.js"></script>
    <script src="mob.js"></script>
    <script src="script.js"></script>
</body>
</html>
