<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>zorr.pro.dps</title>
    <style>
        #lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .lightbox-content {
            background-color: white;
            margin: 10% auto;
            padding: 20px;
            width: 300px;
            border: 1px solid black;
        }
    </style>
</head>
<body>

    <h1>zorr.pro.dps</h1>
    
    <button onclick="openLightbox()">+ Add Petal</button>
    <br><br>

    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Health</th>
                <th>Armor</th>
                <th>Damage</th>
                <th>Reload (s)</th>
                <th><button onclick="sortByDPS()">DPS ↕️</button></th>
            </tr>
        </thead>
        <tbody id="table-body">
        </tbody>
    </table>

    <div id="lightbox">
        <div class="lightbox-content">
            <h3>Select a petal:</h3>
            <ul id="selection-list">
            </ul>
            <button onclick="closeLightbox()">Close</button>
        </div>
    </div>

    <script src="petal.js"></script>
    <script>
        let activePetals = [];
        let isAscending = false;

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = ""; 

            activePetals.forEach(petal => {
                const calculatedDPS = (petal.damage / petal.reload).toFixed(2);
                
                const row = `<tr>
                    <td>${petal.name}</td>
                    <td>${petal.health}</td>
                    <td>${petal.armor}</td>
                    <td>${petal.damage}</td>
                    <td>${petal.reload}</td>
                    <td>${calculatedDPS}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        function sortByDPS() {
            activePetals.sort((a, b) => {
                const dpsA = a.damage / a.reload;
                const dpsB = b.damage / b.reload;
                
                if (isAscending) {
                    return dpsA - dpsB;
                } else {
                    return dpsB - dpsA;
                }
            });
            isAscending = !isAscending; 
            renderTable(); 
        }

        function openLightbox() {
            document.getElementById('lightbox').style.display = 'block'; 
            
            const selectionList = document.getElementById('selection-list');
            selectionList.innerHTML = ""; 

            petals.forEach((petal, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<button onclick="addPetal(${index})">Add ${petal.name}</button>`;
                li.style.marginBottom = "5px"; 
                selectionList.appendChild(li);
            });
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        function addPetal(index) {
            const selectedPetal = petals[index];
            activePetals.push(selectedPetal);
            renderTable();
            closeLightbox();
        }

        renderTable();
    </script>
</body>
</html>
