<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>zorr.pro.dps</title>
    <style>
        #lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .lightbox-content {
            background-color: white;
            margin: 10% auto;
            padding: 20px;
            width: 300px;
            border: 1px solid black;
        }
        .stats-container {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            display: inline-block;
        }
    </style>
</head>
<body>

    <h1>zorr.pro.dps</h1>
    
    <div class="stats-container">
        <label for="player-luck">Player Luck Multiplier:</label>
        <input type="number" id="player-luck" value="1.0" step="0.1" oninput="updatePlayerStats()">
    </div>
    <br>

    <button onclick="openLightbox()">+ Add Petal</button>
    <br><br>

    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Health</th>
                <th>Armor</th>
                <th>Damage</th>
                <th>Reload (s)</th>
                <th><button onclick="sortByDPS()">Effective DPS ↕️</button></th>
            </tr>
        </thead>
        <tbody id="table-body">
        </tbody>
    </table>

    <div id="lightbox">
        <div class="lightbox-content">
            <h3>Select a petal:</h3>
            <ul id="selection-list">
            </ul>
            <button onclick="closeLightbox()">Close</button>
        </div>
    </div>

    <script src="petal.js"></script>
    <script>
        let activePetals = [];
        let isAscending = false;
        
        const playerStats = {
            luck: 1.0
        };

        const effectHandlers = {
            luckMultiplier: (baseDPS, effect, stats) => {
                const triggerChance = Math.min(effect.chance * stats.luck, 1.0);
                const standardChance = 1 - triggerChance;
                const expectedMultiplier = (standardChance * 1) + (triggerChance * effect.multiplier);
                return baseDPS * expectedMultiplier;
            }
        };

        function updatePlayerStats() {
            const luckInput = document.getElementById('player-luck').value;
            playerStats.luck = parseFloat(luckInput) || 1.0;
            renderTable();
        }

        function calculateEffectiveDPS(petal) {
            const baseDPS = petal.damage / petal.reload;
            
            if (petal.special && effectHandlers[petal.special.type]) {
                return effectHandlers[petal.special.type](baseDPS, petal.special, playerStats);
            }
            
            return baseDPS;
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = ""; 

            activePetals.forEach(petal => {
                const effectiveDPS = calculateEffectiveDPS(petal).toFixed(2);
                
                const row = `<tr>
                    <td>${petal.name}</td>
                    <td>${petal.health}</td>
                    <td>${petal.armor}</td>
                    <td>${petal.damage}</td>
                    <td>${petal.reload}</td>
                    <td>${effectiveDPS}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        function sortByDPS() {
            activePetals.sort((a, b) => {
                const dpsA = calculateEffectiveDPS(a);
                const dpsB = calculateEffectiveDPS(b);
                
                if (isAscending) {
                    return dpsA - dpsB;
                } else {
                    return dpsB - dpsA;
                }
            });
            isAscending = !isAscending; 
            renderTable(); 
        }

        function openLightbox() {
            document.getElementById('lightbox').style.display = 'block'; 
            
            const selectionList = document.getElementById('selection-list');
            selectionList.innerHTML = ""; 

            petals.forEach((petal, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<button onclick="addPetal(${index})">Add ${petal.name}</button>`;
                li.style.marginBottom = "5px"; 
                selectionList.appendChild(li);
            });
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        function addPetal(index) {
            activePetals.push(petals[index]);
            renderTable();
            closeLightbox();
        }

        renderTable();
    </script>
</body>
</html>
