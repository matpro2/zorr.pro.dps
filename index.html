<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>zorr.pro.dps</title>
    <style>
        .lightbox-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .lightbox-content {
            background-color: white;
            margin: 10% auto;
            padding: 20px;
            width: 300px;
            border: 1px solid black;
        }
        .stats-container, .mob-container {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            display: inline-block;
        }
        .tier-container {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <h1>zorr.pro.dps</h1>

    <div class="mob-container">
        <h2>Target Mob</h2>
        <div id="active-mob-display">No mob selected</div>
        <br>
        <button onclick="openMobLightbox()">Select Mob</button>
    </div>
    <br>
    
    <div class="stats-container">
        <label for="player-luck">Player Luck Multiplier:</label>
        <input type="number" id="player-luck" value="1.0" step="0.1" oninput="updatePlayerStats()">
    </div>
    <br>

    <button onclick="openPetalLightbox()">+ Add Petal</button>
    <br><br>

    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Tier</th>
                <th>Health</th>
                <th>Armor</th>
                <th>Damage</th>
                <th>Reload (s)</th>
                <th><button onclick="sortByDPS()">Effective DPS ↕️</button></th>
            </tr>
        </thead>
        <tbody id="table-body">
        </tbody>
    </table>

    <div id="petal-lightbox" class="lightbox-modal">
        <div class="lightbox-content">
            <h3>Select a petal:</h3>
            <div class="tier-container">
                <label for="tier-selection">Petal Tier:</label>
                <input type="number" id="tier-selection" value="0" min="0">
            </div>
            <ul id="petal-selection-list">
            </ul>
            <button onclick="closePetalLightbox()">Close</button>
        </div>
    </div>

    <div id="mob-lightbox" class="lightbox-modal">
        <div class="lightbox-content">
            <h3>Select a mob:</h3>
            <div class="tier-container">
                <label for="mob-tier-selection">Mob Tier:</label>
                <input type="number" id="mob-tier-selection" value="0" min="0">
            </div>
            <ul id="mob-selection-list">
            </ul>
            <button onclick="closeMobLightbox()">Close</button>
        </div>
    </div>

    <script src="petal.js"></script>
    <script src="mob.js"></script>
    <script>
        let activePetals = [];
        let activeMob = null;
        let isAscending = false;
        
        const playerStats = {
            luck: 1.0
        };

        const effectHandlers = {
            luckMultiplier: (baseDPS, effect, stats) => {
                const triggerChance = Math.min(effect.chance * stats.luck, 1.0);
                const standardChance = 1 - triggerChance;
                const expectedMultiplier = (standardChance * 1) + (triggerChance * effect.multiplier);
                return baseDPS * expectedMultiplier;
            }
        };

        function updatePlayerStats() {
            const luckInput = document.getElementById('player-luck').value;
            playerStats.luck = parseFloat(luckInput) || 1.0;
            renderTable();
        }

        function calculateEffectiveDPS(petal) {
            const baseDPS = petal.damage / petal.reload;
            
            if (petal.special && effectHandlers[petal.special.type]) {
                return effectHandlers[petal.special.type](baseDPS, petal.special, playerStats);
            }
            
            return baseDPS;
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = ""; 

            activePetals.forEach(petal => {
                const effectiveDPS = calculateEffectiveDPS(petal).toFixed(2);
                
                const row = `<tr>
                    <td>${petal.name}</td>
                    <td>${petal.tier}</td>
                    <td>${petal.health.toLocaleString()}</td>
                    <td>${petal.armor.toLocaleString()}</td>
                    <td>${petal.damage.toLocaleString()}</td>
                    <td>${petal.reload}</td>
                    <td>${effectiveDPS}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        function sortByDPS() {
            activePetals.sort((a, b) => {
                const dpsA = calculateEffectiveDPS(a);
                const dpsB = calculateEffectiveDPS(b);
                
                if (isAscending) {
                    return dpsA - dpsB;
                } else {
                    return dpsB - dpsA;
                }
            });
            isAscending = !isAscending; 
            renderTable(); 
        }

        function openPetalLightbox() {
            document.getElementById('petal-lightbox').style.display = 'block'; 
            const selectionList = document.getElementById('petal-selection-list');
            selectionList.innerHTML = ""; 
            petals.forEach((petal, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<button onclick="addPetal(${index})">Add ${petal.name}</button>`;
                li.style.marginBottom = "5px"; 
                selectionList.appendChild(li);
            });
        }

        function closePetalLightbox() {
            document.getElementById('petal-lightbox').style.display = 'none';
        }

        function addPetal(index) {
            const tierInput = document.getElementById('tier-selection').value;
            const selectedTier = parseInt(tierInput) || 0;
            const statMultiplier = Math.pow(3, selectedTier);
            
            const clonedPetal = structuredClone(petals[index]);
            clonedPetal.tier = selectedTier;
            clonedPetal.health *= statMultiplier;
            clonedPetal.damage *= statMultiplier;
            clonedPetal.armor *= statMultiplier;
            
            activePetals.push(clonedPetal);
            renderTable();
            closePetalLightbox();
        }

        function renderActiveMob() {
            const display = document.getElementById('active-mob-display');
            if (!activeMob) {
                display.innerHTML = "No mob selected";
                return;
            }
            display.innerHTML = `<strong>${activeMob.name} (Tier ${activeMob.tier})</strong><br>
                                 Health: ${activeMob.health.toLocaleString()} | 
                                 Damage: ${activeMob.damage.toLocaleString()} | 
                                 Armor: ${activeMob.armor.toLocaleString()}`;
        }

        function openMobLightbox() {
            document.getElementById('mob-lightbox').style.display = 'block'; 
            const selectionList = document.getElementById('mob-selection-list');
            selectionList.innerHTML = ""; 
            mobs.forEach((mob, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<button onclick="selectMob(${index})">Select ${mob.name}</button>`;
                li.style.marginBottom = "5px"; 
                selectionList.appendChild(li);
            });
        }

        function closeMobLightbox() {
            document.getElementById('mob-lightbox').style.display = 'none';
        }

        function selectMob(index) {
            const tierInput = document.getElementById('mob-tier-selection').value;
            const selectedTier = parseInt(tierInput) || 0;
            
            const healthFactors = [3.75, 3.6, 4, 7.5, 6, 15, 12];
            let healthMultiplier = 1;
            for (let i = 0; i < selectedTier; i++) {
                if (i < healthFactors.length) {
                    healthMultiplier *= healthFactors[i];
                }
            }

            const otherStatMultiplier = Math.pow(3, selectedTier);
            
            activeMob = structuredClone(mobs[index]);
            activeMob.tier = selectedTier;
            activeMob.health *= healthMultiplier;
            activeMob.damage *= otherStatMultiplier;
            activeMob.armor *= otherStatMultiplier;

            renderActiveMob();
            closeMobLightbox();
        }

        renderTable();
        renderActiveMob();
    </script>
</body>
</html>
