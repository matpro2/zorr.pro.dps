<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>zorr.pro.dps</title>
    <style>
        /* MINIMUM CSS POUR LA LIGHTBOX */
        #ma-lightbox {
            display: none; /* Caché par défaut */
            position: fixed; /* Reste en place même si on scrolle */
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5); /* Fond noir semi-transparent */
        }
        .lightbox-contenu {
            background-color: white;
            margin: 10% auto; /* Centré avec une marge en haut */
            padding: 20px;
            width: 300px;
            border: 1px solid black;
        }
    </style>
</head>
<body>

    <h1>zorr.pro.dps</h1>
    
    <!-- Bouton pour ouvrir la lightbox -->
    <button onclick="ouvrirLightbox()">+ Ajouter une unité</button>
    <br><br>

    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Health</th>
                <th>Damage</th>
                <th><button onclick="trierParDPS()">Damage Per Second ↕️</button></th>
            </tr>
        </thead>
        <tbody id="corps-tableau">
            <!-- Le tableau est vide par défaut -->
        </tbody>
    </table>

    <!-- STRUCTURE DE LA LIGHTBOX -->
    <div id="ma-lightbox">
        <div class="lightbox-contenu">
            <h3>Choisissez une unité :</h3>
            <ul id="liste-choix">
                <!-- Les choix seront injectés ici par Javascript -->
            </ul>
            <button onclick="fermerLightbox()">Fermer/Annuler</button>
        </div>
    </div>

    <script>
        // 1. La base de données de toutes les unités existantes (import)
        const baseDeDonnees = [
            { name: "Guerrier", health: 1500, damage: 50, dps: 25 },
            { name: "Mage", health: 800, damage: 120, dps: 60 },
            { name: "Archer", health: 1000, damage: 80, dps: 80 },
            { name: "Voleur", health: 900, damage: 40, dps: 100 },
            { name: "Paladin", health: 2000, damage: 60, dps: 20 }
        ];

        // 2. Le tableau des unités ACTUELLEMENT dans notre table (vide au départ)
        let unitesActuelles = [];
        let triCroissant = false;

        // Fonction pour afficher les unités présentes dans "unitesActuelles"
        function afficherTableau() {
            const tbody = document.getElementById('corps-tableau');
            tbody.innerHTML = ""; 

            unitesActuelles.forEach(unite => {
                const ligne = `<tr>
                    <td>${unite.name}</td>
                    <td>${unite.health}</td>
                    <td>${unite.damage}</td>
                    <td>${unite.dps}</td>
                </tr>`;
                tbody.innerHTML += ligne;
            });
        }

        // Fonction pour trier
        function trierParDPS() {
            unitesActuelles.sort((a, b) => {
                if (triCroissant) return a.dps - b.dps;
                else return b.dps - a.dps;
            });
            triCroissant = !triCroissant; 
            afficherTableau(); 
        }

        /* --- LOGIQUE DE LA LIGHTBOX --- */

        // Afficher la lightbox et la remplir avec la base de données
        function ouvrirLightbox() {
            document.getElementById('ma-lightbox').style.display = 'block'; // Affiche la div
            
            const listeChoix = document.getElementById('liste-choix');
            listeChoix.innerHTML = ""; // On vide la liste avant de la générer

            // On crée un élément de liste pour chaque unité dans la base de données
            baseDeDonnees.forEach((unite, index) => {
                const li = document.createElement('li');
                // On passe l'index (0, 1, 2...) pour savoir exactement quelle unité on ajoute
                li.innerHTML = `<button onclick="ajouterUnite(${index})">Ajouter ${unite.name}</button>`;
                li.style.marginBottom = "5px"; // Petit espacement pour que ce soit lisible
                listeChoix.appendChild(li);
            });
        }

        // Cacher la lightbox
        function fermerLightbox() {
            document.getElementById('ma-lightbox').style.display = 'none';
        }

        // Ajouter l'unité au tableau principal
        function ajouterUnite(indexDeLUnite) {
            // On récupère l'unité dans la base de données grâce à son index
            const uniteChoisie = baseDeDonnees[indexDeLUnite];
            
            // On l'ajoute à notre tableau actif
            unitesActuelles.push(uniteChoisie);
            
            // On met à jour l'affichage de notre table HTML
            afficherTableau();
            
            // On ferme la lightbox automatiquement
            fermerLightbox();
        }

        // Affichage initial (qui donnera un tableau HTML vide)
        afficherTableau();
    </script>

</body>
</html>
