<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>zorr.pro.dps</title>
    <style>
        /* Reset basique et Typographie */
        body { font-family: sans-serif; margin: 10px; color: #222; }
        button { cursor: pointer; padding: 6px 12px; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #eee; }
        input[type="number"] { width: 60px; padding: 4px; }
        
        /* Grille principale */
        .layout { display: flex; gap: 15px; flex-wrap: wrap; }
        .panel { flex: 1; min-width: 250px; padding: 15px; border: 1px solid #ccc; }
        .slots-container { flex: 2; min-width: 400px; }
        .action-buttons, .input-group { display: flex; gap: 10px; align-items: center; margin: 10px 0; }
        
        /* Table de comparaison */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { cursor: pointer; background: #eee; }
        
        /* Affichage des Slots équipés & Stats */
        .equipped-item { border: 1px solid #999; margin-bottom: 8px; padding: 8px; }
        .item-main-row { display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .dps-details { font-size: 0.85em; border-top: 1px dashed #999; margin-top: 6px; padding-top: 6px; }
        #total-dps-display { text-align: right; font-size: 1.2em; font-weight: bold; margin-top: 10px; }
        #player-stats-display { padding: 10px; background: #f8f8f8; border-left: 4px solid #666; line-height: 1.6; }
        
        /* Lightboxes (Modales) - Strictement nécessaire pour le fonctionnement */
        .lightbox-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .lightbox-content { background: #fff; margin: 5vh auto; padding: 15px; width: 90%; max-width: 450px; max-height: 85vh; overflow-y: auto; border: 1px solid #333; }
        .sticky-header { position: sticky; top: -15px; background: #fff; padding-bottom: 10px; border-bottom: 1px solid #ccc; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>zorr.pro.dps</h1>

    <div class="layout">
        <div class="panel slots-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="margin: 0;">Equipped Slots</h2>
                <button onclick="openSupportLightbox()">+ Add Support</button>
            </div>
            <div id="slots-list">No items equipped</div>
            <div id="total-dps-display">Total DPS: <strong>0.00</strong></div>
        </div>

        <div class="panel mob-container">
            <h2>Target Mob</h2>
            <div id="active-mob-display">No mob selected</div>
            <button onclick="openMobLightbox()" style="margin-top:10px;">Select Mob</button>
        </div>
        
        <div class="panel stats-container">
            <h2>Player Stats</h2>
            <div id="player-stats-display"></div>
        </div>
    </div>

    <div class="action-buttons">
        <button onclick="openPetalLightbox()">+ Add DPS Petal</button>
        <button onclick="openEggLightbox()">+ Add Egg</button>
    </div>

    <div class="panel">
        <table>
            <thead>
                <tr>
                    <th onclick="ui.sortTable('name')">Name ↕️</th>
                    <th onclick="ui.sortTable('tier')">Tier ↕️</th>
                    <th>Entities</th>
                    <th>Eqp / Owned</th>
                    <th>Health</th>
                    <th>Armor</th>
                    <th>Damage</th>
                    <th>Reload</th>
                    <th>Special</th>
                    <th>Ticks</th>
                    <th onclick="ui.sortByDPS()">Effective DPS ↕️</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <!-- Lightboxes -->
    <div id="petal-lightbox" class="lightbox-modal">
        <div class="lightbox-content">
            <div class="sticky-header">
                <h3>Add a DPS Petal</h3>
                <div class="input-group">
                    <label>Tier:</label>
                    <input type="number" id="tier-selection" value="0" min="0">
                    <label>Quantité :</label>
                    <input type="number" id="petal-quantity-input" value="1" min="1">
                </div>
            </div>
            <ul id="petal-selection-list"></ul>
            <button onclick="closePetalLightbox()" style="width:100%; margin-top:10px;">Close</button>
        </div>
    </div>
    
    <div id="egg-lightbox" class="lightbox-modal">
        <div class="lightbox-content">
            <div class="sticky-header">
                <h3>Add an Egg</h3>
                <div class="input-group">
                    <label>Tier:</label>
                    <input type="number" id="egg-tier-selection" value="0" min="0">
                    <label>Quantité :</label>
                    <input type="number" id="egg-quantity-input" value="1" min="1">
                </div>
            </div>
            <ul id="egg-selection-list"></ul>
            <button onclick="closeEggLightbox()" style="width:100%; margin-top:10px;">Close</button>
        </div>
    </div>

    <div id="support-lightbox" class="lightbox-modal">
        <div class="lightbox-content">
            <div class="sticky-header">
                <h3>Equip a Support Petal</h3>
                <div class="input-group">
                    <label>Tier:</label>
                    <input type="number" id="support-tier-selection" value="0" min="0">
                    <label>Quantité :</label>
                    <input type="number" id="support-quantity-input" value="1" min="1">
                </div>
            </div>
            <ul id="support-selection-list"></ul>
            <button onclick="closeSupportLightbox()" style="width:100%; margin-top:10px;">Close</button>
        </div>
    </div>

    <div id="mob-lightbox" class="lightbox-modal">
        <div class="lightbox-content">
            <div class="sticky-header">
                <h3>Select Mob</h3>
                <label>Tier:</label>
                <input type="number" id="mob-tier-selection" value="0" min="0">
            </div>
            <ul id="mob-selection-list"></ul>
            <button onclick="closeMobLightbox()" style="width:100%; margin-top:10px;">Close</button>
        </div>
    </div>

    <script src="petal.js"></script>
    <script src="eggs.js"></script>
    <script src="mob.js"></script>
    <script src="engine.js"></script>
    <script src="ui.js"></script>
</body>
</html>
